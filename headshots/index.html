<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Headshots Arcade Soccer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="game-shell is-menu" id="gameShell">
    <canvas id="game" aria-label="Headshots arcade soccer game"></canvas>

    <section class="main-menu" id="mainMenu" aria-label="Main menu">
      <div class="menu-panel">
        <p class="menu-kicker">Arcade football duel</p>
        <h1>Headshots</h1>
        <p class="menu-copy">Big heads, fast volleys, loud goals. First whistle starts the match.</p>

        <div class="menu-roster" aria-hidden="true">
          <div class="menu-card menu-card--home">
            <span class="menu-card__head"></span>
            <strong>Home Hero</strong>
          </div>
          <div class="menu-vs">VS</div>
          <div class="menu-card menu-card--away">
            <span class="menu-card__head"></span>
            <strong>Street CPU</strong>
          </div>
        </div>

        <div class="menu-actions">
          <button class="primary-button" id="startButton" type="button">Start Match</button>
          <button class="sound-button" id="soundButton" type="button" aria-pressed="true">Sound On</button>
        </div>
      </div>
    </section>

    <section class="hud" aria-hidden="true">
      <div class="player-tag player-tag--home">HOME</div>
      <div class="scoreboard">
        <span id="homeScore">0</span>
        <span class="scoreboard__clock" id="clock">90</span>
        <span id="awayScore">0</span>
      </div>
      <div class="player-tag player-tag--away">CPU</div>
    </section>

    <section class="message" id="message" aria-live="polite">
      <strong>Headshots</strong>
      <span>Score more before the clock runs out.</span>
    </section>

    <section class="touch-controls" aria-label="Touch controls">
      <div class="touch-cluster">
        <button class="touch-button" data-control="left" aria-label="Move left">&lt;</button>
        <button class="touch-button" data-control="right" aria-label="Move right">&gt;</button>
      </div>
      <div class="touch-cluster">
        <button class="touch-button touch-button--jump" data-control="jump" aria-label="Jump">JUMP</button>
        <button class="touch-button touch-button--kick" data-control="kick" aria-label="Kick">KICK</button>
      </div>
    </section>

    <button class="restart-button" id="restartButton" type="button">Restart</button>
  </main>

  <script src="./game.js"></script>
</body>
</html>
